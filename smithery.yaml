# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio

configSchema:
  type: object
  required: []
  properties:
    enableEdhrec:
      type: boolean
      default: true
      description: "Enable EDHREC backend (scrapes undocumented endpoints, may break)"
    enable17lands:
      type: boolean
      default: true
      description: "Enable 17Lands draft data backend"
    enableMtgjson:
      type: boolean
      default: true
      description: "Enable MTGJSON bulk card data backend"

commandFunction:
  |-
  (config) => ({ command: 'uvx', args: ['mtg-mcp-server'], env: { MTG_MCP_ENABLE_EDHREC: String(config.enableEdhrec ?? true), MTG_MCP_ENABLE_17LANDS: String(config.enable17lands ?? true), MTG_MCP_ENABLE_MTGJSON: String(config.enableMtgjson ?? true) } })
