name: Claude Code Review

on:
  pull_request:
    types: [ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Read CLAUDE.md first — it defines the project conventions.

            Review this PR for:
            1. Correctness — logic errors, edge cases, wrong exception types
            2. Error handling — missing `from exc` on raises, swallowed exceptions
            3. Data bugs — optional numeric fields checked with truthiness instead of `is not None`
            4. Architecture — service/provider/workflow layer boundary violations
            5. Security — secrets in code, unsanitized input

            Do NOT flag style, formatting, naming, or missing docstrings on unchanged code.

            Use inline comments for specific issues with severity (critical/warning/suggestion).
            Post a summary comment with verdict and issue counts.
          claude_args: >-
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          show_full_output: true
