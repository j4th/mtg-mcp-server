name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC)
    environment: pypi

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Build package
        run: uv build

      - name: Verify package
        run: uv run --with dist/*.whl --no-project -- python -c "from mtg_mcp_server import __version__; print(f'Publishing mtg-mcp-server {__version__}')"

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

  mcp-registry:
    runs-on: ubuntu-latest
    needs: pypi
    permissions:
      id-token: write  # Required for MCP Registry OIDC
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Wait for PyPI index propagation
        run: |
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Waiting for mtg-mcp-server==${PKG_VERSION} on PyPI..."
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/mtg-mcp-server/${PKG_VERSION}/json" > /dev/null 2>&1; then
              echo "Package found on PyPI after ~$((i * 10))s, waiting 30s for CDN propagation..."
              sleep 30
              echo "Ready."
              exit 0
            fi
            echo "Attempt $i/30 — not yet indexed, waiting 10s..."
            sleep 10
          done
          echo "::warning::PyPI index propagation took longer than 5 minutes"
          exit 1

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
