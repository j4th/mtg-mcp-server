name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC)
    environment: pypi

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Build package
        run: uv build

      - name: Verify package
        run: uv run --with dist/*.whl --no-project -- python -c "from mtg_mcp_server import __version__; print(f'Publishing mtg-mcp-server {__version__}')"

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

  mcp-registry:
    runs-on: ubuntu-latest
    needs: pypi
    permissions:
      id-token: write  # Required for MCP Registry OIDC
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Wait for PyPI index propagation
        run: |
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Waiting for mtg-mcp-server==${PKG_VERSION} on PyPI..."
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/mtg-mcp-server/${PKG_VERSION}/json" > /dev/null 2>&1; then
              echo "Package found on PyPI after ~$((i * 10))s, waiting 90s for CDN propagation..."
              sleep 90
              echo "Ready."
              exit 0
            fi
            echo "Attempt $i/30 — not yet indexed, waiting 10s..."
            sleep 10
          done
          echo "::warning::PyPI index propagation took longer than 5 minutes"
          exit 1

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

  smithery:
    runs-on: ubuntu-latest
    needs: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run setup

      - name: Generate config schema from SmitheryConfig
        run: |
          uv run python -c "
          from mtg_mcp_server.smithery import SmitheryConfig
          import json
          print(json.dumps(SmitheryConfig.model_json_schema()))
          " > /tmp/smithery-config-schema.json
          echo "Generated schema:"
          cat /tmp/smithery-config-schema.json

      - name: Wait for Horizon to rebuild with new version
        run: |
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          HORIZON_URL="https://mtg-mcp-server.fastmcp.app/mcp"
          echo "Waiting for Horizon to serve version ${PKG_VERSION}..."
          for i in $(seq 1 30); do
            # Horizon uses MCP Streamable HTTP (SSE) — parse version from data: lines
            SERVER_VER=$(curl -sS -X POST "$HORIZON_URL" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' \
              2>/dev/null | grep '^data: ' | sed 's/^data: //' | python3 -c "
          import sys, json
          for line in sys.stdin:
              line = line.strip()
              if not line: continue
              try:
                  ver = json.loads(line).get('result', {}).get('serverInfo', {}).get('version', '')
                  if ver: print(ver); break
              except (json.JSONDecodeError, AttributeError): pass
          " 2>/dev/null || true)
            if [ "$SERVER_VER" = "$PKG_VERSION" ]; then
              echo "Horizon serving version ${PKG_VERSION} after ~$((i * 15))s"
              exit 0
            fi
            echo "Attempt $i/30 — got version '${SERVER_VER}', waiting 15s..."
            sleep 15
          done
          echo "::warning::Horizon did not update to ${PKG_VERSION} within 7.5 minutes — publishing anyway"

      - name: Publish to Smithery with config schema
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          npx -y @smithery/cli mcp publish "https://mtg-mcp-server.fastmcp.app/mcp" \
            -n @j4th/mtg-mcp-server \
            --config-schema /tmp/smithery-config-schema.json
