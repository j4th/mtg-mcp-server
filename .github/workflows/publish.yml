name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC)
    environment: pypi   # Optional: add deployment protection rules in repo settings

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Build package
        run: uv build

      - name: Verify package
        run: uv run --with dist/*.whl --no-project -- python -c "from mtg_mcp_server import __version__; print(f'Publishing mtg-mcp-server {__version__}')"

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
