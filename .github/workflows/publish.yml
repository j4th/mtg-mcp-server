name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC)
    environment: pypi

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Build package
        run: uv build

      - name: Verify package
        run: uv run --with dist/*.whl --no-project -- python -c "from mtg_mcp_server import __version__; print(f'Publishing mtg-mcp-server {__version__}')"

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

  mcp-registry:
    runs-on: ubuntu-latest
    needs: pypi
    permissions:
      id-token: write  # Required for MCP Registry OIDC
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
