name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Override Python version
        run: mise use python@${{ matrix.python-version }}

      - name: Install dependencies
        run: mise run setup

      - name: Lint
        run: mise run lint

      - name: Type check
        run: mise run typecheck

      - name: Test
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Verify server.json version matches pyproject.toml
        run: |
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          SERVER_VERSION=$(python3 -c "import json; print(json.load(open('server.json'))['version'])")
          PACKAGE_VERSION=$(python3 -c "import json; print(json.load(open('server.json'))['packages'][0]['version'])")
          echo "pyproject.toml: $PKG_VERSION"
          echo "server.json version: $SERVER_VERSION"
          echo "server.json packages[0].version: $PACKAGE_VERSION"
          if [ "$PKG_VERSION" != "$SERVER_VERSION" ] || [ "$PKG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Version mismatch! Update server.json to match pyproject.toml ($PKG_VERSION)"
            exit 1
          fi

      - name: Verify smithery.yaml matches SmitheryConfig
        run: uv run python scripts/check_smithery_schema.py

      - name: Build package
        run: uv build

      - name: Verify package installs and imports
        run: uv run --with dist/*.whl --no-project -- python -c "from mtg_mcp_server import __version__; print(f'mtg-mcp-server {__version__}')"

      - name: Verify entry point
        run: uv run --with dist/*.whl --no-project -- mtg-mcp-server --help 2>&1

      - name: Verify MCP tool registration
        run: |
          uv run --with dist/*.whl --no-project -- python -c "
          import asyncio
          from fastmcp import Client
          from mtg_mcp_server.server import mcp

          async def check():
              async with Client(transport=mcp) as c:
                  tools = await c.list_tools()
                  print(f'Registered {len(tools)} tools:')
                  for t in sorted(tools, key=lambda t: t.name):
                      print(f'  {t.name}')
                  assert len(tools) >= 20, f'Expected 20+ tools, got {len(tools)}'
          asyncio.run(check())
          "

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run setup

      - name: Audit dependencies
        run: uv run pip-audit --ignore-vuln CVE-2026-4539  # pygments — no fix available yet
