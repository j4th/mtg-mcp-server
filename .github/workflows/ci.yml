name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Override Python version
        run: mise use python@${{ matrix.python-version }}

      - name: Install dependencies
        run: mise run setup

      - name: Lint
        run: mise run lint

      - name: Type check
        run: mise run typecheck

      - name: Test
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  live-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run setup

      - name: Live smoke tests (real server + real APIs)
        run: mise run test:live

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Verify server.json matches pyproject.toml
        run: |
          python3 -c "
          import json, tomllib, sys
          proj = tomllib.load(open('pyproject.toml', 'rb'))['project']
          sj = json.load(open('server.json'))
          errors = []
          # Version check
          for path, val in [('version', sj['version']), ('packages[0].version', sj['packages'][0]['version'])]:
              if val != proj['version']:
                  errors.append(f'server.json {path} ({val}) != pyproject.toml ({proj[\"version\"]})')
          # Description check
          if sj.get('description', '') != proj['description']:
              errors.append(f'server.json description does not match pyproject.toml')
              errors.append(f'  server.json:   {sj.get(\"description\", \"\")}')
              errors.append(f'  pyproject.toml: {proj[\"description\"]}')
          if errors:
              for e in errors: print(f'::error::{e}')
              sys.exit(1)
          print(f'OK: version={proj[\"version\"]}, description matches')
          "

      - name: Verify smithery.yaml matches SmitheryConfig
        run: uv run python scripts/check_smithery_schema.py

      - name: Build package
        run: uv build

      - name: Verify package installs and imports
        run: uv run --with dist/*.whl --no-project -- python -c "from mtg_mcp_server import __version__; print(f'mtg-mcp-server {__version__}')"

      - name: Verify entry point
        run: uv run --with dist/*.whl --no-project -- mtg-mcp-server --help 2>&1

      - name: Verify MCP tool registration
        run: |
          uv run --with dist/*.whl --no-project -- python -c "
          import asyncio
          from fastmcp import Client
          from mtg_mcp_server.server import mcp

          async def check():
              async with Client(transport=mcp) as c:
                  tools = await c.list_tools()
                  print(f'Registered {len(tools)} tools:')
                  for t in sorted(tools, key=lambda t: t.name):
                      print(f'  {t.name}')
                  assert len(tools) >= 20, f'Expected 20+ tools, got {len(tools)}'
          asyncio.run(check())
          "

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run setup

      - name: Audit dependencies
        run: uv run pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2025-64340 --ignore-vuln CVE-2026-27124  # pygments + fastmcp — no fix on 3.1.x
