name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the server is affected?
      options:
        - Scryfall tools (scryfall_*)
        - Bulk data tools (bulk_*)
        - Spellbook tools (spellbook_*)
        - Draft tools (draft_*)
        - EDHREC tools (edhrec_*)
        - Commander workflows
        - Deck building workflows
        - Draft/limited workflows
        - Rules engine
        - Installation / setup
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Configure the server with '...'
        2. Call tool '...' with arguments '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or tool output if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: mtg-mcp-server version
      placeholder: "2.0.0"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - streamable HTTP
        - FastMCP Horizon (hosted)

  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      options:
        - Claude Code
        - Claude Desktop
        - Claude Mobile
        - MCP Inspector
        - Other

  - type: textarea
    id: config
    attributes:
      label: Relevant Configuration
      description: List any non-default environment variables (e.g., `MTG_MCP_ENABLE_EDHREC=false`, `MTG_MCP_ENABLE_BULK_DATA=false`).
      render: bash
